<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#040812"/>
      <stop offset="100%" stop-color="#0e1626"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#d4af6e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d4af6e" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#glow)"/>
    <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#d4af6e" stroke-opacity="0.3" stroke-width="2"/>

    <!-- Small decorative star -->
    <g transform="translate(133, 143) rotate(22.5)">
      <polygon points="0,-36 11,-11 36,0 11,11 0,36 -11,11 -36,0 -11,-11"
               fill="#f0d9b0" opacity="0.8"/>
    </g>

    <!-- Crescent moon -->
    <g transform="translate(282, 236)">
      <circle r="155" fill="#d4af6e" opacity="0.15"/>
      <circle r="138" fill="#f0d9b0"/>
      <circle cx="38" cy="-24" r="115" fill="#0a121e"/>
    </g>

    <!-- Mosque silhouette -->
    <g transform="translate(184, 400)" fill="#d4af6e" opacity="0.5">
      <!-- Dome -->
      <path d="M -67 0 A 67 67 0 0 1 67 0 Z"/>
      <!-- Spire -->
      <rect x="-2" y="-100" width="4" height="36"/>
      <circle cx="0" cy="-102" r="6"/>
      <!-- Body -->
      <rect x="-82" y="0" width="164" height="80"/>
      <!-- Arch -->
      <path d="M -22 80 L -22 50 A 22 22 0 0 1 22 50 L 22 80 Z" fill="#0a121e"/>
      <!-- Left minaret -->
      <rect x="-105" y="-20" width="13" height="100"/>
      <path d="M -111 -28 A 6.5 6.5 0 0 1 -86 -28 Z"/>
      <!-- Right minaret -->
      <rect x="92" y="-20" width="13" height="100"/>
      <path d="M 86 -28 A 6.5 6.5 0 0 1 111 -28 Z"/>
    </g>
  </g>
</svg>
